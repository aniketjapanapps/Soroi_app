<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>揃い Soroi — Shop Floor Pickup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf8f5;--warm:#f5f0ea;--surface:#fff;--surface-hover:#fefcfa;
  --text:#2c1810;--text-2:#6b5a4e;--text-3:#a39485;--text-4:#c8beb4;
  --border:#e8e0d8;--border-lt:#f0ebe5;
  --brand:#c8553d;--brand-dk:#a8432f;--brand-lt:#fdf0ed;--brand-bg:rgba(200,85,61,.06);
  --cart:#2d7a4f;--cart-dk:#1e5c38;--cart-lt:#edf7f1;--cart-bg:rgba(45,122,79,.08);
  --miss:#d4842a;--miss-lt:#fdf4e8;
  --blue:#4a7fb5;--blue-lt:#edf3fa;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --shadow:0 1px 3px rgba(44,24,16,.06),0 1px 2px rgba(44,24,16,.04);
  --shadow-md:0 4px 16px rgba(44,24,16,.08);
  --shadow-lg:0 8px 30px rgba(44,24,16,.12);
  --font:'Outfit',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}
html{font-family:var(--font);font-size:15px;color:var(--text);background:var(--cream);-webkit-text-size-adjust:100%}
body{min-height:100dvh;overflow-x:hidden}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}

/* ── App Shell ────────────────────────────────────── */
#app{display:flex;flex-direction:column;min-height:100dvh}

/* Header — warm paper bag vibe */
.hdr{
  background:var(--brand);color:#fff;
  padding:14px 16px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
  background-image:linear-gradient(135deg,var(--brand) 0%,#b5472e 100%);
  box-shadow:0 2px 12px rgba(200,85,61,.25);
}
.hdr-back{
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--r-sm);transition:background .15s;flex-shrink:0;
}
.hdr-back:hover{background:rgba(255,255,255,.15)}
.hdr-back svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.hdr-body{flex:1;min-width:0}
.hdr-title{font-weight:700;font-size:1.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:.72rem;opacity:.7;margin-top:1px}
.hdr-user{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.hdr-avatar{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.3)}
.hdr-name{font-size:.78rem;font-weight:500;opacity:.85;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.content{flex:1;padding:16px;padding-bottom:calc(20px + var(--safe-b))}

/* ── Login ────────────────────────────────────────── */
.login{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;padding:32px 24px;text-align:center;
  background:linear-gradient(170deg,var(--cream) 0%,#f0e8dd 100%);
}
.login-bag{
  width:88px;height:88px;border-radius:24px;margin-bottom:22px;
  background:var(--brand);display:flex;align-items:center;justify-content:center;
  box-shadow:0 14px 36px rgba(200,85,61,.3);
  position:relative;overflow:hidden;
}
.login-bag::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.12) 100%);
}
.login-bag svg{width:42px;height:42px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;position:relative;z-index:1}
.login-brand{font-size:2rem;font-weight:800;color:var(--text);letter-spacing:-.03em;margin-bottom:2px}
.login-brand span{color:var(--brand)}
.login-jp{font-size:.88rem;color:var(--text-3);margin-bottom:6px;font-weight:500}
.login-sub{font-size:.85rem;color:var(--text-3);margin-bottom:28px;line-height:1.5}
.login-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--surface);color:var(--text);font-weight:600;font-size:.95rem;
  padding:13px 32px;border-radius:var(--r);
  box-shadow:var(--shadow-md);border:1.5px solid var(--border);
  transition:transform .12s,box-shadow .12s;
}
.login-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-lg)}
.login-btn svg{width:20px;height:20px}
.login-error{color:var(--brand);margin-top:14px;font-size:.85rem;display:none;white-space:pre-line}

/* ── Cards & Grids ────────────────────────────────── */
.section-title{font-size:1.15rem;font-weight:700;margin-bottom:4px;letter-spacing:-.01em}
.section-sub{font-size:.82rem;color:var(--text-2);margin-bottom:16px}
.cards{display:flex;flex-direction:column;gap:10px}
.card{
  background:var(--surface);border-radius:var(--r);
  padding:14px 16px;box-shadow:var(--shadow);
  border:1.5px solid var(--border-lt);
  display:flex;align-items:center;gap:12px;
  transition:transform .1s,box-shadow .1s;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.card:active{transform:scale(.985);box-shadow:none}
.card-ico{
  width:44px;height:44px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:1.4rem;
}
.card-body{flex:1;min-width:0}
.card-name{font-weight:600;font-size:.95rem}
.card-detail{font-size:.78rem;color:var(--text-3);margin-top:2px}
.card-arrow{color:var(--text-4)}
.card-arrow svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.card-all{border:2px dashed var(--brand);background:var(--brand-lt)}
.card-all .card-ico{background:var(--brand);color:#fff;font-size:1.2rem}
.card-all .card-name{color:var(--brand)}

/* ── Pickup List ──────────────────────────────────── */
.meta-bar{
  display:flex;flex-wrap:wrap;gap:6px 14px;
  font-size:.78rem;color:var(--text-2);margin-bottom:12px;
}
.meta-bar svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;margin-right:3px}

/* Multiplier */
.mult-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border-radius:var(--r);
  padding:10px 14px;margin-bottom:12px;box-shadow:var(--shadow);
  border:1.5px solid var(--border-lt);
}
.mult-bar label{font-size:.82rem;font-weight:600;color:var(--text-2);white-space:nowrap}
.mult-bar input{
  width:52px;text-align:center;padding:6px 4px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-weight:700;font-size:1rem;background:var(--warm);
}
.mult-hint{font-size:.72rem;color:var(--text-3);flex:1}

/* Progress — receipt-style */
.prog-wrap{
  background:var(--surface);border-radius:var(--r);
  padding:12px 14px;margin-bottom:12px;box-shadow:var(--shadow);
  border:1.5px solid var(--border-lt);
}
.prog-top{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text-2);margin-bottom:6px;font-weight:500}
.prog-track{height:7px;background:var(--warm);border-radius:4px;overflow:hidden;position:relative}
.prog-fill-cart{position:absolute;left:0;top:0;height:100%;background:var(--cart);border-radius:4px;transition:width .3s}
.prog-fill-miss{position:absolute;top:0;height:100%;background:var(--miss);border-radius:4px;transition:width .3s,left .3s}
.prog-nums{display:flex;gap:16px;margin-top:8px;font-size:.82rem;font-weight:600}
.prog-nums .n-cart{color:var(--cart)}
.prog-nums .n-miss{color:var(--miss)}
.prog-nums .n-rem{color:var(--text-3)}

/* Filter tabs — shopping category pills */
.filters{
  display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.filters::-webkit-scrollbar{display:none}
.ftab{
  padding:7px 14px;border-radius:20px;font-size:.8rem;font-weight:600;
  white-space:nowrap;border:1.5px solid var(--border);color:var(--text-2);
  background:var(--surface);transition:all .15s;flex-shrink:0;
}
.ftab.active{background:var(--text);color:#fff;border-color:var(--text)}
.ftab .cnt{display:inline-block;margin-left:3px;font-size:.7rem;opacity:.6}

/* Group header — aisle marker */
.grp{margin-bottom:16px}
.grp-hdr{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:var(--r-sm);
  background:var(--warm);border:1.5px solid var(--border-lt);
  margin-bottom:6px;
}
.grp-seq{
  background:var(--text);color:#fff;
  font-family:var(--mono);font-size:.7rem;font-weight:600;
  padding:2px 8px;border-radius:8px;flex-shrink:0;
}
.grp-name{font-weight:600;font-size:.88rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.grp-count{font-size:.75rem;color:var(--text-3);font-weight:500;flex-shrink:0}
.grp-unit{font-size:.68rem;color:var(--text-4);flex-shrink:0;font-style:italic}

/* Part row — product card */
.prow{
  display:flex;align-items:flex-start;gap:8px;
  padding:10px 12px;background:var(--surface);
  border-radius:var(--r-sm);margin-bottom:4px;
  border:1.5px solid var(--border-lt);
  transition:all .15s;
}
.prow.in-cart{background:var(--cart-lt);border-color:#b5dfc4}
.prow.missing{background:var(--miss-lt);border-color:#f0d9b4}
.prow.filt-out{display:none}

.prow-btns{display:flex;flex-direction:column;gap:3px;flex-shrink:0;padding-top:1px}
.pbtn{
  width:34px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  transition:all .1s;border:1.5px solid var(--border);
}
.pbtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.pbtn.cart-btn{color:var(--cart)}
.pbtn.cart-btn:hover,.pbtn.cart-btn.on{background:var(--cart);color:#fff;border-color:var(--cart)}
.pbtn.miss-btn{color:var(--miss)}
.pbtn.miss-btn:hover,.pbtn.miss-btn.on{background:var(--miss);color:#fff;border-color:var(--miss)}

.prow-seq{
  background:var(--brand);color:#fff;
  font-family:var(--mono);font-size:.66rem;font-weight:600;
  padding:2px 7px;border-radius:8px;flex-shrink:0;
  min-width:26px;text-align:center;margin-top:2px;
}
.prow-body{flex:1;min-width:0}
.prow-name{font-weight:600;font-size:.88rem;line-height:1.25}
.prow-pn{font-size:.72rem;color:var(--text-3);font-family:var(--mono);margin-top:1px}
.prow-pills{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.pill{font-size:.65rem;font-weight:600;padding:1px 6px;border-radius:6px;white-space:nowrap}
.pill-f{background:#ede9fe;color:#6d28d9}
.pill-l{background:#fef3c7;color:#b45309}
.pill-t{background:var(--blue-lt);color:var(--blue)}

.prow-qty{
  font-weight:800;font-size:1.05rem;min-width:30px;text-align:center;
  flex-shrink:0;color:var(--text);padding-top:2px;
}

.prow-note{
  width:100%;margin-top:6px;padding:5px 8px;
  border:1px solid var(--border);border-radius:6px;
  font-size:.78rem;background:var(--warm);display:none;
}
.prow.in-cart .prow-note,.prow.missing .prow-note{display:block}

/* Submit bar — checkout */
.checkout{
  position:sticky;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1.5px solid var(--border);
  padding:12px 16px calc(12px + var(--safe-b));
  display:flex;gap:10px;z-index:50;
  box-shadow:0 -4px 16px rgba(44,24,16,.06);
}
.ckout-btn{
  flex:1;padding:13px;border-radius:var(--r);
  font-weight:700;font-size:.92rem;transition:all .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.ckout-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ckout-primary{background:var(--cart);color:#fff}
.ckout-primary:hover{background:var(--cart-dk)}
.ckout-primary:disabled{background:var(--border);color:var(--text-4);cursor:not-allowed}
.ckout-secondary{background:var(--warm);color:var(--text-2);border:1.5px solid var(--border)}

/* History */
.hist-row{
  background:var(--surface);border-radius:var(--r-sm);
  padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);border:1.5px solid var(--border-lt);
}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hist-unit{font-weight:600;font-size:.9rem}
.hist-date{font-size:.76rem;color:var(--text-3)}
.hist-stats{display:flex;gap:12px;font-size:.82rem}
.hist-stats .s-cart{color:var(--cart);font-weight:600}
.hist-stats .s-miss{color:var(--miss);font-weight:600}

/* Admin */
.admin{
  background:var(--surface);border-radius:var(--r);
  padding:16px;margin-top:20px;box-shadow:var(--shadow);border:1.5px solid var(--border-lt);
}
.admin h3{font-size:.88rem;font-weight:700;margin-bottom:10px;color:var(--text-2)}
.abtn{
  padding:7px 14px;border-radius:var(--r-sm);font-size:.8rem;font-weight:600;
  background:var(--warm);border:1.5px solid var(--border);
  margin-right:6px;margin-bottom:6px;
}
.abtn:hover{background:var(--border)}
.abtn.danger{border-color:var(--brand);color:var(--brand)}
.admin-note{font-size:.75rem;color:var(--text-3);margin-top:8px}

/* Toast */
.toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-100px);
  padding:10px 20px;border-radius:var(--r);font-size:.85rem;font-weight:500;
  box-shadow:var(--shadow-lg);z-index:1000;max-width:calc(100vw - 32px);text-align:center;
  transition:transform .3s cubic-bezier(.4,0,.2,1);background:var(--text);color:#fff;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--brand)}
.toast.ok{background:var(--cart)}

/* Modal */
.mdl-ov{
  position:fixed;inset:0;background:rgba(44,24,16,.45);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.mdl-ov.show{opacity:1;pointer-events:auto}
.mdl{
  background:var(--surface);border-radius:var(--r-lg) var(--r-lg) 0 0;
  padding:24px 20px calc(24px + var(--safe-b));width:100%;max-width:480px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.mdl-ov.show .mdl{transform:translateY(0)}
.mdl-t{font-weight:700;font-size:1.05rem;margin-bottom:6px}
.mdl-p{font-size:.88rem;color:var(--text-2);margin-bottom:18px;line-height:1.5}
.mdl-acts{display:flex;gap:10px}
.mdl-acts button{flex:1;padding:12px;border-radius:var(--r);font-weight:600;font-size:.9rem}
.mdl-cancel{background:var(--warm);border:1.5px solid var(--border)}
.mdl-ok{background:var(--cart);color:#fff}
.mdl-danger{background:var(--brand);color:#fff}

/* Loading */
.spin{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-c{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px;color:var(--text-3);font-size:.88rem}

/* Utility */
.hidden{display:none!important}
.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<div id="modal" class="mdl-ov">
  <div class="mdl"><div class="mdl-t" id="mt"></div><div class="mdl-p" id="mp"></div><div class="mdl-acts" id="ma"></div></div>
</div>

<script>

// ── GIS: Sheets token (from Part Inventory) ──────────
function initGIS(){
  if(typeof google==='undefined'||!google?.accounts){setTimeout(initGIS,300);return;}
  gisClient=google.accounts.oauth2.initTokenClient({
    client_id:GIS_CLIENT_ID,scope:GIS_SCOPES,
    callback:r=>{if(r.access_token){sheetsToken=r.access_token;localStorage.setItem('soroi_sheets_token',sheetsToken);}}
  });
}
function gisReAuth(){
  return new Promise((resolve,reject)=>{
    if(!gisClient){reject(new Error('GIS not ready'));return;}
    let done=false;const orig=gisClient.callback;
    gisClient.callback=r=>{if(done)return;done=true;gisClient.callback=orig;
      if(r.access_token){sheetsToken=r.access_token;localStorage.setItem('soroi_sheets_token',sheetsToken);resolve();}
      else reject(new Error('Token fail'));};
    gisClient.requestAccessToken({prompt:''});
    setTimeout(()=>{if(!done){done=true;gisClient.callback=orig;reject(new Error('Timeout'));}},12000);
  });
}
async function sheetsApi(url,opts={},retry=false){
  if(!sheetsToken)sheetsToken=localStorage.getItem('soroi_sheets_token');
  if(!sheetsToken)throw new Error('NEEDS_GIS_AUTH');
  const r=await fetch(url,{...opts,headers:{Authorization:'Bearer '+sheetsToken,'Content-Type':'application/json',...(opts.headers||{})}});
  if(r.status===401&&!retry){try{await gisReAuth();return sheetsApi(url,opts,true);}catch{sheetsToken=null;localStorage.removeItem('soroi_sheets_token');throw new Error('NEEDS_GIS_AUTH');}}
  if(!r.ok){const t=await r.text();throw new Error(`Sheets ${r.status}: ${t}`);}
  return r.json();
}
function gisRequestToken(){if(gisClient)gisClient.requestAccessToken();else toast('Auth not ready','err');}

// ── BOM Tree Logic ───────────────────────────────────
function buildMap(nodes){const m={};nodes.forEach(n=>{m[n.id]={...n,children:[]};});nodes.forEach(n=>{if(n.parent_id&&m[n.parent_id])m[n.parent_id].children.push(m[n.id]);});return m;}
function getUnits(nodes){return nodes.filter(n=>n.level===2).sort((a,b)=>a.sort_order-b.sort_order);}
function leaves(node){if(!node.children?.length)return[node];return node.children.flatMap(c=>leaves(c));}
function groupsForUnit(nodes,uid){
  const map=buildMap(nodes),unit=map[uid];if(!unit)return[];
  return(unit.children||[]).map(c=>c.level===3?{header:c,parts:leaves(c)}:{header:null,parts:[c]});
}
function groupsForAll(nodes){
  const units=getUnits(nodes),map=buildMap(nodes),out=[];
  units.forEach(u=>{const um=map[u.id];if(!um)return;(um.children||[]).forEach(c=>{
    out.push(c.level===3?{header:c,parts:leaves(c),unitName:u.name}:{header:null,parts:[c],unitName:u.name});
  });});return out;
}
function countParts(nodes,uid){
  const map=buildMap(nodes);
  function desc(n){if(!n.children?.length)return n.level>=4?1:0;return n.children.reduce((s,c)=>s+desc(c),0);}
  return desc(map[uid]||{children:[]});
}

// ── Google Sheets Write ──────────────────────────────
async function writeRows(rows){
  if(!S.sheetId){toast('No Sheet ID configured','err');return false;}
  try{
    const url=`https://sheets.googleapis.com/v4/spreadsheets/${S.sheetId}/values/Sheet1!A:J:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
    await sheetsApi(url,{method:'POST',body:JSON.stringify({values:rows})});
    return true;
  }catch(e){
    console.error(e);
    if(e.message==='NEEDS_GIS_AUTH'){toast('Sheets auth needed — see button below','err');return'AUTH';}
    const q=JSON.parse(localStorage.getItem('soroi_queue')||'[]');q.push({rows,ts:Date.now()});
    localStorage.setItem('soroi_queue',JSON.stringify(q));
    toast('Saved offline — will retry','err');return false;
  }
}
async function retryQueue(){
  const q=JSON.parse(localStorage.getItem('soroi_queue')||'[]');if(!q.length)return;
  const rem=[];for(const it of q){const ok=await writeRows(it.rows);if(!ok)rem.push(it);}
  localStorage.setItem('soroi_queue',JSON.stringify(rem));
  if(rem.length<q.length)toast(`Synced ${q.length-rem.length} queued`,'ok');
}

async function submitPickup(){
  const all=S.groups.flatMap(g=>g.parts);
  const marked=all.filter(p=>S.picks[p.id]).length;
  if(!marked){toast('Mark at least one item','err');return;}
  const uLabel=S.selUnit?S.selUnit.name:'Full Assembly';
  modal('Checkout','Submit '+marked+' item(s) for "'+uLabel+'" to the sheet?',[
    {label:'Cancel',cls:'mdl-cancel'},
    {label:'Submit',cls:'mdl-ok',fn:doSubmit},
  ]);
}
async function doSubmit(){
  S.submitting=true;render();
  const now=new Date();
  const ds=now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  const ts=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const aName=S.selAssembly?.name||'';const uLabel=S.selUnit?S.selUnit.name:'Full Assembly';
  const person=S.user?.name||S.user?.email||'Unknown';
  const rows=[];
  S.groups.forEach(g=>g.parts.forEach(p=>{
    const st=S.picks[p.id];if(!st)return;
    rows.push([person,`${ds} ${ts}`,aName,uLabel,p.name,p.part_number||'',(p.qty||1)*S.mult,st==='cart'?'Picked':'Missing',[p.fastener,p.loctite,p.torque].filter(Boolean).join(' / '),S.notes[p.id]||'']);
  }));
  const ok=await writeRows(rows);S.submitting=false;
  if(ok===true){
    S.history.unshift({date:ds+' '+ts,assembly:aName,unit:uLabel,picked:rows.filter(r=>r[7]==='Picked').length,missing:rows.filter(r=>r[7]==='Missing').length,total:rows.length});
    localStorage.setItem('soroi_history',JSON.stringify(S.history.slice(0,50)));
    clearPicks();toast('Pickup submitted!','ok');S.view='units';
  }else if(ok==='AUTH'){
    // Show auth button
  }
  render();
}

        <div class="card-ico">🛒</div>
        <div class="card-body"><div class="card-name">Full Assembly</div><div class="card-detail">${total} items across ${units.length} aisles</div></div>
        <div class="card-arrow">${svg('chev')}</div>
      </div>
      ${units.map(u=>`
        <div class="card" data-act="sel-unit" data-id="${u.id}">
          <div class="card-ico" style="background:var(--warm)">${uEmoji[u.name]||'📦'}</div>
          <div class="card-body"><div class="card-name">${esc(u.name)}</div><div class="card-detail">${countParts(nodes,u.id)} items</div></div>
          <div class="card-arrow">${svg('chev')}</div>
        </div>`).join('')}
      <div class="card" data-act="history" style="border-style:dashed;margin-top:8px">
        <div class="card-ico" style="background:var(--warm);font-size:1.1rem">🧾</div>
        <div class="card-body"><div class="card-name" style="color:var(--text-2)">Past Receipts</div><div class="card-detail">View pickup history</div></div>
        <div class="card-arrow">${svg('chev')}</div>
      </div>
    </div>
  </div>`;}

// ── Pickup View (Shopping List) ──────────────────────
function rPickup(){
  const a=S.selAssembly;const uLabel=S.selUnit?S.selUnit.name:'Full Assembly';
  const all=S.groups.flatMap(g=>g.parts);const tot=all.length;
  const cart=all.filter(p=>S.picks[p.id]==='cart').length;
  const miss=all.filter(p=>S.picks[p.id]==='miss').length;
  const rem=tot-cart-miss;
  const ff={all:()=>true,remaining:p=>!S.picks[p.id],cart:p=>S.picks[p.id]==='cart',miss:p=>S.picks[p.id]==='miss'}[S.filter]||(()=>true);

  return`${rHdr(uLabel,'Shopping list',true,false)}
  <div class="content fade" style="padding-bottom:80px">
    <div class="meta-bar">
      <span>${svg('box')} ${esc(a?.name||'')}</span>
      <span>${svg('user')} ${esc(S.user?.name||'')}</span>
      <span>${svg('cal')} ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short'})}</span>
    </div>
    <div class="mult-bar">
      <label>Units ×</label>
      <input type="number" id="multIn" value="${S.mult}" min="1" max="99" onchange="S.mult=Math.max(1,parseInt(this.value)||1);render()">
      <div class="mult-hint">Multiply all quantities</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-top"><span>${cart+miss} of ${tot} items</span><span>${tot?Math.round((cart+miss)/tot*100):0}%</span></div>
      <div class="prog-track">
        <div class="prog-fill-cart" style="width:${tot?(cart/tot*100):0}%"></div>
        <div class="prog-fill-miss" style="left:${tot?(cart/tot*100):0}%;width:${tot?(miss/tot*100):0}%"></div>
      </div>
      <div class="prog-nums">
        <span class="n-cart">🛒 ${cart} in cart</span>
        <span class="n-miss">⚠️ ${miss} missing</span>
        <span class="n-rem">${rem} remaining</span>
      </div>
    </div>
    <div class="filters">
      <button class="ftab ${S.filter==='all'?'active':''}" data-flt="all">All <span class="cnt">${tot}</span></button>
      <button class="ftab ${S.filter==='remaining'?'active':''}" data-flt="remaining">Remaining <span class="cnt">${rem}</span></button>
      <button class="ftab ${S.filter==='cart'?'active':''}" data-flt="cart">In Cart <span class="cnt">${cart}</span></button>
      <button class="ftab ${S.filter==='miss'?'active':''}" data-flt="miss">Missing <span class="cnt">${miss}</span></button>
    </div>
    ${S.groups.map(g=>{
      const gp=g.parts,gc=gp.filter(p=>S.picks[p.id]==='cart').length,gm=gp.filter(p=>S.picks[p.id]==='miss').length;
      const vis=gp.filter(ff);if(!vis.length)return'';
      return`<div class="grp">
        <div class="grp-hdr">
          ${g.header?.sequence_tag?`<span class="grp-seq">#${esc(g.header.sequence_tag)}</span>`:''}
          <span class="grp-name">${esc(g.header?.name||g.unitName||'Parts')}</span>
          <span class="grp-count">${gc+gm}/${gp.length}</span>
          ${g.unitName?`<span class="grp-unit">${esc(g.unitName)}</span>`:''}
        </div>
        ${gp.map(p=>{
          const ps=S.picks[p.id]||'';const v=ff(p);
          return`<div class="prow ${ps==='cart'?'in-cart':ps==='miss'?'missing':''} ${v?'':'filt-out'}" data-pid="${p.id}">
            <div class="prow-btns">
              <button class="pbtn cart-btn ${ps==='cart'?'on':''}" data-do="cart" data-id="${p.id}" title="Add to cart">${svg('check')}</button>
              <button class="pbtn miss-btn ${ps==='miss'?'on':''}" data-do="miss" data-id="${p.id}" title="Missing">${svg('x')}</button>
            </div>
            ${p.sequence_tag?`<span class="prow-seq">${esc(p.sequence_tag)}</span>`:''}
            <div class="prow-body">
              <div class="prow-name">${esc(p.name)}</div>
              ${p.part_number?`<div class="prow-pn">${esc(p.part_number)}</div>`:''}
              <div class="prow-pills">
                ${p.fastener?`<span class="pill pill-f">${esc(p.fastener)}</span>`:''}
                ${p.loctite?`<span class="pill pill-l">${esc(p.loctite)}</span>`:''}
                ${p.torque?`<span class="pill pill-t">${esc(p.torque)}</span>`:''}
              </div>
              <input class="prow-note" type="text" placeholder="Add note…" value="${esc(S.notes[p.id]||'')}" data-do="note" data-id="${p.id}">
            </div>
            <div class="prow-qty">${(p.qty||1)*S.mult}</div>
          </div>`;}).join('')}
      </div>`;}).join('')}
  </div>
  <div class="checkout">
    <button class="ckout-btn ckout-secondary" onclick="modal('Reset','Clear all picks?',[{label:'Cancel',cls:'mdl-cancel'},{label:'Reset',cls:'mdl-danger',fn:()=>{clearPicks();render();}}])">Reset</button>
    <button class="ckout-btn ckout-primary" onclick="submitPickup()" ${S.submitting?'disabled':''}>
      ${S.submitting?'<div class="spin" style="width:18px;height:18px;border-width:2px"></div>':svg('send')}
      ${S.submitting?'Submitting…':`Checkout (${cart+miss})`}
    </button>
    ${!sheetsToken?`<button class="ckout-btn ckout-secondary" onclick="gisRequestToken()" style="flex:0;padding:13px 16px;font-size:.78rem">🔑 Sheets</button>`:''}
  </div>`;}

// ── History View ─────────────────────────────────────
function rHistory(){
  return`${rHdr('Past Receipts','Pickup history',true,false)}
  <div class="content fade">
    ${!S.history.length?'<div class="loading-c">No receipts yet</div>':
    S.history.map(h=>`
      <div class="hist-row">
        <div class="hist-top"><span class="hist-unit">${esc(h.unit)}</span><span class="hist-date">${esc(h.date)}</span></div>
        <div class="hist-stats">
          <span>${esc(h.assembly)}</span>
          <span class="s-cart">🛒 ${h.picked}</span>
          <span class="s-miss">⚠️ ${h.missing}</span>
        </div>
      </div>`).join('')}
  </div>`;}

// ── Header ───────────────────────────────────────────
function rHdr(title,sub,back,showUser){
  return`<div class="hdr">
    ${back?`<button class="hdr-back" onclick="goBack()">${svg('back')}</button>`:''}
    <div class="hdr-body"><div class="hdr-title">${esc(title)}</div>${sub?`<div class="hdr-sub">${esc(sub)}</div>`:''}</div>
    ${showUser&&S.user?`<div class="hdr-user"><span class="hdr-name">${esc(S.user.name.split(' ')[0])}</span>
      <button onclick="doLogout()" style="font-size:.7rem;opacity:.6;text-decoration:underline">Logout</button></div>`:''}
  </div>`;}

// ── Event Binding ────────────────────────────────────
function bind(){
  document.querySelectorAll('[data-act="sel-assy"]').forEach(el=>el.onclick=async()=>{
    S.selAssembly=S.assemblies.find(a=>a.id===el.dataset.id);nav('units');await loadNodes(el.dataset.id);render();
  });
  document.querySelectorAll('[data-act="sel-unit"]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.id;const nodes=JSON.parse(localStorage.getItem('soroi_nodes_'+S.selAssembly.id)||'[]');
    if(id==='all'){S.selUnit=null;S.groups=groupsForAll(nodes);}
    else{S.selUnit=nodes.find(n=>n.id===id);S.groups=groupsForUnit(nodes,id);}
    S.filter='all';S.mult=1;loadPicks();nav('pickup');
  });
  document.querySelectorAll('[data-act="history"]').forEach(el=>el.onclick=()=>nav('history'));
  document.querySelectorAll('[data-do="cart"]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();const id=el.dataset.id;
    S.picks[id]=S.picks[id]==='cart'?undefined:'cart';if(!S.picks[id])delete S.picks[id];savePicks();render();
  });
  document.querySelectorAll('[data-do="miss"]').forEach(el=>el.onclick=e=>{
    e.stopPropagation();const id=el.dataset.id;
    S.picks[id]=S.picks[id]==='miss'?undefined:'miss';if(!S.picks[id])delete S.picks[id];savePicks();render();
  });
  document.querySelectorAll('[data-do="note"]').forEach(el=>el.oninput=()=>{S.notes[el.dataset.id]=el.value;savePicks();});
  document.querySelectorAll('[data-flt]').forEach(el=>el.onclick=()=>{S.filter=el.dataset.flt;render();});
}
</script>
</body>
</html>
