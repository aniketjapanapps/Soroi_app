<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>揃い Soroi — Shop Floor Pickup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf8f5;--warm:#f5f0ea;--sf:#fff;--tx:#2c1810;--t2:#6b5a4e;--t3:#a39485;--t4:#c8beb4;--bd:#e8e0d8;--bl:#f0ebe5;--br:#c8553d;--br-dk:#a8432f;--br-lt:#fdf0ed;--ct:#2d7a4f;--ct-dk:#1e5c38;--ct-lt:#edf7f1;--ms:#d4842a;--ms-lt:#fdf4e8;--blu:#4a7fb5;--blu-lt:#edf3fa;--r:12px;--rs:8px;--rl:16px;--sh:0 1px 3px rgba(44,24,16,.06);--shm:0 4px 16px rgba(44,24,16,.08);--ft:'Outfit',system-ui,sans-serif;--mn:'IBM Plex Mono',monospace;--sb:env(safe-area-inset-bottom,0px)}
html{font-family:var(--ft);font-size:15px;color:var(--tx);background:var(--cream);-webkit-text-size-adjust:100%}
body{min-height:100dvh;overflow-x:hidden}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
#app{display:flex;flex-direction:column;min-height:100dvh}

/* Header */
.hdr{background:linear-gradient(135deg,var(--br),#b5472e);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(200,85,61,.25)}
.hdr-bk{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);flex-shrink:0}.hdr-bk:hover{background:rgba(255,255,255,.15)}
.hdr-bk svg,.hdr svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.hdr-b{flex:1;min-width:0}.hdr-t{font-weight:700;font-size:1.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.hdr-s{font-size:.72rem;opacity:.7;margin-top:1px}
.hdr-u{display:flex;align-items:center;gap:6px;flex-shrink:0;font-size:.78rem;opacity:.85}
.cnt{flex:1;padding:16px;padding-bottom:calc(20px + var(--sb))}

/* Login */
.lgn{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px 24px;text-align:center;background:linear-gradient(170deg,var(--cream),#f0e8dd)}
.lgn-ic{width:88px;height:88px;border-radius:24px;margin-bottom:22px;background:var(--br);display:flex;align-items:center;justify-content:center;box-shadow:0 14px 36px rgba(200,85,61,.3);position:relative;overflow:hidden}
.lgn-ic::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.12))}
.lgn-ic svg{width:42px;height:42px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;position:relative;z-index:1}
.lgn-h1{font-size:2rem;font-weight:800;letter-spacing:-.03em;margin-bottom:2px}.lgn-h1 span{color:var(--br)}
.lgn-jp{font-size:.88rem;color:var(--t3);margin-bottom:6px;font-weight:500}
.lgn-p{font-size:.85rem;color:var(--t3);margin-bottom:28px}
.lgn-btn{display:inline-flex;align-items:center;gap:10px;background:var(--sf);color:var(--tx);font-weight:600;font-size:.95rem;padding:13px 32px;border-radius:var(--r);box-shadow:var(--shm);border:1.5px solid var(--bd);transition:transform .12s}
.lgn-btn:hover{transform:translateY(-1px)}
.lgn-err{color:var(--br);margin-top:14px;font-size:.85rem;display:none}

/* Cards */
.st{font-size:1.15rem;font-weight:700;margin-bottom:4px}.ss{font-size:.82rem;color:var(--t2);margin-bottom:14px}
.cds{display:flex;flex-direction:column;gap:8px}
.cd{background:var(--sf);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);border:1.5px solid var(--bl);display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s}.cd:active{transform:scale(.985)}
.cd-i{width:42px;height:42px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.3rem}
.cd-b{flex:1;min-width:0}.cd-n{font-weight:600;font-size:.95rem}.cd-d{font-size:.78rem;color:var(--t3);margin-top:2px}
.cd-a{color:var(--t4)}.cd-a svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.cd-all{border:2px dashed var(--br);background:var(--br-lt)}.cd-all .cd-i{background:var(--br);color:#fff;font-size:1.1rem}.cd-all .cd-n{color:var(--br)}

/* Section divider */
.sdv{display:flex;align-items:center;gap:10px;margin:22px 0 12px}.sdv-l{flex:1;height:1px;background:var(--bd)}.sdv-t{font-size:.78rem;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}

/* Upload */
.upl{border:2px dashed var(--bd);border-radius:var(--r);padding:20px;text-align:center;color:var(--t3);cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:10px}
.upl:hover{border-color:var(--br);background:var(--br-lt)}
.upl svg{width:28px;height:28px;stroke:var(--t3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 6px;display:block}
.upl p{font-size:.82rem;font-weight:500}

/* Pickup meta */
.meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:.78rem;color:var(--t2);margin-bottom:12px}
.meta svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:-2px;margin-right:3px}

/* Multiplier */
.mlt{display:flex;align-items:center;gap:10px;background:var(--sf);border-radius:var(--r);padding:10px 14px;margin-bottom:12px;box-shadow:var(--sh);border:1.5px solid var(--bl)}
.mlt label{font-size:.82rem;font-weight:600;color:var(--t2);white-space:nowrap}
.mlt input{width:52px;text-align:center;padding:6px 4px;border:1.5px solid var(--bd);border-radius:var(--rs);font-weight:700;font-size:1rem;background:var(--warm)}
.mlt-h{font-size:.72rem;color:var(--t3);flex:1}

/* Progress */
.prg{background:var(--sf);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;box-shadow:var(--sh);border:1.5px solid var(--bl)}
.prg-t{display:flex;justify-content:space-between;font-size:.78rem;color:var(--t2);margin-bottom:6px;font-weight:500}
.prg-b{height:7px;background:var(--warm);border-radius:4px;overflow:hidden;position:relative}
.prg-c{position:absolute;left:0;top:0;height:100%;background:var(--ct);border-radius:4px;transition:width .3s}
.prg-m{position:absolute;top:0;height:100%;background:var(--ms);border-radius:4px;transition:width .3s,left .3s}
.prg-n{display:flex;gap:16px;margin-top:8px;font-size:.82rem;font-weight:600}.nc{color:var(--ct)}.nm{color:var(--ms)}.nr{color:var(--t3)}

/* Filter tabs */
.flt{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}.flt::-webkit-scrollbar{display:none}
.fb{padding:7px 14px;border-radius:20px;font-size:.8rem;font-weight:600;white-space:nowrap;border:1.5px solid var(--bd);color:var(--t2);background:var(--sf);flex-shrink:0;transition:all .15s}.fb.on{background:var(--tx);color:#fff;border-color:var(--tx)}.fb .cc{display:inline-block;margin-left:3px;font-size:.7rem;opacity:.6}

/* Group */
.grp{margin-bottom:16px}
.gh{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--rs);background:var(--warm);border:1.5px solid var(--bl);margin-bottom:6px}
.gh-s{background:var(--tx);color:#fff;font-family:var(--mn);font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:8px;flex-shrink:0}
.gh-n{font-weight:600;font-size:.88rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gh-c{font-size:.75rem;color:var(--t3);font-weight:500;flex-shrink:0}
.gh-u{font-size:.68rem;color:var(--t4);flex-shrink:0;font-style:italic}

/* Part row */
.pr{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;background:var(--sf);border-radius:var(--rs);margin-bottom:4px;border:1.5px solid var(--bl);transition:all .15s}
.pr.ic{background:var(--ct-lt);border-color:#b5dfc4}.pr.mi{background:var(--ms-lt);border-color:#f0d9b4}.pr.fo{display:none}
.pr-bt{display:flex;flex-direction:column;gap:3px;flex-shrink:0;padding-top:1px}
.pb{width:34px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bd);transition:all .1s}
.pb svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.pb.cb{color:var(--ct)}.pb.cb:hover,.pb.cb.on{background:var(--ct);color:#fff;border-color:var(--ct)}
.pb.mb{color:var(--ms)}.pb.mb:hover,.pb.mb.on{background:var(--ms);color:#fff;border-color:var(--ms)}
.pr-sq{background:var(--br);color:#fff;font-family:var(--mn);font-size:.66rem;font-weight:600;padding:2px 7px;border-radius:8px;flex-shrink:0;min-width:26px;text-align:center;margin-top:2px}
.pr-bd{flex:1;min-width:0}.pr-nm{font-weight:600;font-size:.88rem;line-height:1.25}.pr-pn{font-size:.72rem;color:var(--t3);font-family:var(--mn);margin-top:1px}
.pr-pl{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.pill{font-size:.65rem;font-weight:600;padding:1px 6px;border-radius:6px;white-space:nowrap}
.pf{background:#ede9fe;color:#6d28d9}.pl{background:#fef3c7;color:#b45309}.pt{background:var(--blu-lt);color:var(--blu)}
.pr-q{font-weight:800;font-size:1.05rem;min-width:30px;text-align:center;flex-shrink:0;padding-top:2px}
.pr-nt{width:100%;margin-top:6px;padding:5px 8px;border:1px solid var(--bd);border-radius:6px;font-size:.78rem;background:var(--warm);display:none}
.pr.ic .pr-nt,.pr.mi .pr-nt{display:block}

/* Checkout bar */
.cko{position:sticky;bottom:0;left:0;right:0;background:var(--sf);border-top:1.5px solid var(--bd);padding:12px 16px calc(12px + var(--sb));display:flex;gap:10px;z-index:50;box-shadow:0 -4px 16px rgba(44,24,16,.06)}
.ckb{flex:1;padding:13px;border-radius:var(--r);font-weight:700;font-size:.92rem;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.ckb svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ckp{background:var(--ct);color:#fff}.ckp:hover{background:var(--ct-dk)}.ckp:disabled{background:var(--bd);color:var(--t4);cursor:not-allowed}
.cks{background:var(--warm);color:var(--t2);border:1.5px solid var(--bd)}

/* History */
.hr{background:var(--sf);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh);border:1.5px solid var(--bl)}
.hr-t{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}.hr-u{font-weight:600;font-size:.9rem}.hr-d{font-size:.76rem;color:var(--t3)}
.hr-s{display:flex;gap:12px;font-size:.82rem}.hr-s .sc{color:var(--ct);font-weight:600}.hr-s .sm{color:var(--ms);font-weight:600}

/* Admin */
.adm{background:var(--sf);border-radius:var(--r);padding:16px;margin-top:20px;box-shadow:var(--sh);border:1.5px solid var(--bl)}
.adm h3{font-size:.88rem;font-weight:700;margin-bottom:10px;color:var(--t2)}
.ab{padding:7px 14px;border-radius:var(--rs);font-size:.8rem;font-weight:600;background:var(--warm);border:1.5px solid var(--bd);margin-right:6px;margin-bottom:6px}.ab:hover{background:var(--bd)}
.adm-n{font-size:.75rem;color:var(--t3);margin-top:8px}

/* Utility */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-100px);padding:10px 20px;border-radius:var(--r);font-size:.85rem;font-weight:500;box-shadow:0 8px 30px rgba(44,24,16,.12);z-index:1000;max-width:calc(100vw - 32px);text-align:center;transition:transform .3s cubic-bezier(.4,0,.2,1);background:var(--tx);color:#fff}
.toast.show{transform:translateX(-50%) translateY(0)}.toast.err{background:var(--br)}.toast.ok{background:var(--ct)}
.mo{position:fixed;inset:0;background:rgba(44,24,16,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}.mo.show{opacity:1;pointer-events:auto}
.mo .md{background:var(--sf);border-radius:var(--rl) var(--rl) 0 0;padding:24px 20px calc(24px + var(--sb));width:100%;max-width:480px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}.mo.show .md{transform:translateY(0)}
.md-t{font-weight:700;font-size:1.05rem;margin-bottom:6px}.md-p{font-size:.88rem;color:var(--t2);margin-bottom:18px;line-height:1.5}
.md-a{display:flex;gap:10px}.md-a button{flex:1;padding:12px;border-radius:var(--r);font-weight:600;font-size:.9rem}
.mdc{background:var(--warm);border:1.5px solid var(--bd)}.mdo{background:var(--ct);color:#fff}.mdd{background:var(--br);color:#fff}
.spin{width:24px;height:24px;border:3px solid var(--bd);border-top-color:var(--br);border-radius:50%;animation:sp .6s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
.lc{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px;color:var(--t3);font-size:.88rem}
.fade{animation:fi .2s ease}@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<div id="modal" class="mo"><div class="md"><div class="md-t" id="mt"></div><div class="md-p" id="mp"></div><div class="md-a" id="ma"></div></div></div>
<input type="file" id="jf" accept=".json" style="display:none">
<script>
/* ═══════════════════════════════════════════════════════
   揃い SOROI — Shop Floor Pickup
   Dual input: Axon trees + JSON templates
   ═══════════════════════════════════════════════════════ */
const SB_URL='https://wylxvmkcrexwfpjpbhyy.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5bHh2bWtjcmV4d2ZwanBiaHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MzkxMDYsImV4cCI6MjA4NDIxNTEwNn0.6Bxo42hx4jwlJGWnfjiTpiDUsYfc1QLTN3YtrU1efak';
const GIS_CID='1088099187141-ut0dn0scqt3h99htf3rg8gsrg2oo1ad8.apps.googleusercontent.com';
const sb=window.supabase.createClient(SB_URL,SB_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:'sb-soroi-auth'}});

// State
let S={user:null,view:'loading',sheetId:localStorage.getItem('soroi_sid')||'',
  axonProj:[],axonAssy:[],selProj:null,selAssy:null,selUnit:null,
  jsonTpl:[],selTpl:null,_tree:null,
  groups:[],picks:{},notes:{},mult:1,filter:'all',source:null,
  history:JSON.parse(localStorage.getItem('soroi_hist')||'[]'),
  submitting:false,authOk:false};
let gisC=null,sTk=localStorage.getItem('soroi_stk')||null;

// SVG icons
const I={
  back:'<polyline points="15 18 9 12 15 6"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  chev:'<polyline points="9 18 15 12 9 6"/>',
  cart:'<circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/>',
  box:'<path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
  send:'<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  clock:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  user:'<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  up:'<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  file:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>'
};
function svg(n){return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">'+( I[n]||'')+'</svg>';}
const GL='<svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>';

// Helpers
function $(id){return document.getElementById(id);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m,t){var e=$('toast');e.textContent=m;e.className='toast show '+(t||'');clearTimeout(toast._t);toast._t=setTimeout(function(){e.className='toast';},2800);}
function modal(t,p,a){$('mt').textContent=t;$('mp').textContent=p;var el=$('ma');el.innerHTML='';a.forEach(function(x){var b=document.createElement('button');b.textContent=x.label;b.className=x.cls||'mdc';b.onclick=function(){$('modal').classList.remove('show');if(x.fn)x.fn();};el.appendChild(b);});$('modal').classList.add('show');}

// ── Auth (Supabase OAuth) ────────────────────────────
window.onload=function(){
  sb.auth.onAuthStateChange(async function(ev,sess){
    if(sess&&sess.user&&(ev==='SIGNED_IN'||ev==='TOKEN_REFRESHED'||ev==='INITIAL_SESSION')){
      await ckRole(sess.user);S.authOk=true;
    }else if(ev==='SIGNED_OUT'||(ev==='INITIAL_SESSION'&&!sess)){
      S.user=null;S.authOk=true;nav('login');
    }
  });
  setTimeout(function(){if(!S.authOk)nav('login');},4000);
  initGIS();
};

async function doLogin(){
  var r=await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}});
  if(r.error){var e=$('le');if(e){e.textContent='Login failed: '+r.error.message;e.style.display='block';}}
}
async function doLogout(){await sb.auth.signOut();S.user=null;sTk=null;localStorage.removeItem('soroi_stk');nav('login');}

async function ckRole(u){
  try{
    var r=await sb.from('authentication_mode_user_roles').select('name,role').eq('email',u.email).single();
    if(r.data){S.user={email:u.email,name:r.data.name||u.email,role:r.data.role,isAdmin:r.data.role==='admin'};}
    else{S.user={email:u.email,name:(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0],role:'user',isAdmin:false};}
  }catch(e){
    S.user={email:u.email,name:(u.user_metadata&&u.user_metadata.full_name)||u.email.split('@')[0],role:'user',isAdmin:false};
  }
  nav('home');loadHome();
}

// ── GIS (Google Sheets auth) ─────────────────────────
function initGIS(){
  if(typeof google==='undefined'||!google||!google.accounts){setTimeout(initGIS,300);return;}
  gisC=google.accounts.oauth2.initTokenClient({
    client_id:GIS_CID,
    scope:'https://www.googleapis.com/auth/spreadsheets',
    callback:function(r){if(r.access_token){sTk=r.access_token;localStorage.setItem('soroi_stk',sTk);}}
  });
}
function gisReAuth(){
  return new Promise(function(res,rej){
    if(!gisC)return rej();var d=false,o=gisC.callback;
    gisC.callback=function(r){if(d)return;d=true;gisC.callback=o;if(r.access_token){sTk=r.access_token;localStorage.setItem('soroi_stk',sTk);res();}else rej();};
    gisC.requestAccessToken({prompt:''});
    setTimeout(function(){if(!d){d=true;gisC.callback=o;rej();}},12000);
  });
}
async function shApi(url,opts,retry){
  if(!sTk)sTk=localStorage.getItem('soroi_stk');
  if(!sTk)throw new Error('NEEDS_AUTH');
  opts=opts||{};
  var r=await fetch(url,Object.assign({},opts,{headers:Object.assign({Authorization:'Bearer '+sTk,'Content-Type':'application/json'},opts.headers||{})}));
  if(r.status===401&&!retry){try{await gisReAuth();return shApi(url,opts,true);}catch(e){sTk=null;localStorage.removeItem('soroi_stk');throw new Error('NEEDS_AUTH');}}
  if(!r.ok)throw new Error('API '+r.status);
  return r.json();
}
function gisReq(){if(gisC)gisC.requestAccessToken();else toast('Auth not ready','err');}

async function loadAxonTree(aid){

// ── Axon tree building ───────────────────────────────
function buildTree(nodes,links){
  var p2c={},lm={};
  links.forEach(function(l){
    if(!p2c[l.parent_id])p2c[l.parent_id]=[];
    p2c[l.parent_id].push(l.child_id);
    lm[l.child_id]=l;
  });
  var cids={};links.forEach(function(l){cids[l.child_id]=true;});
  var roots=nodes.filter(function(n){return !cids[n.id];});
  var nm={};nodes.forEach(function(n){nm[n.id]=Object.assign({},n,{children:[],level:0});});
  function sLv(id,lv){if(!nm[id])return;nm[id].level=lv;(p2c[id]||[]).forEach(function(c){sLv(c,lv+1);});}
  roots.forEach(function(r){sLv(r.id,1);});
  links.forEach(function(l){if(nm[l.parent_id]&&nm[l.child_id])nm[l.parent_id].children.push(nm[l.child_id]);});
  return{nm:nm,roots:roots.map(function(r){return nm[r.id];}),lm:lm};
}
function getUnits(nm,roots){
  var u=[];
  roots.forEach(function(r){(r.children||[]).forEach(function(c){if(c.level===2)u.push(c);});});
  return u.length?u:roots;
}
function leaves(n){if(!n.children||!n.children.length)return[n];var out=[];n.children.forEach(function(c){out=out.concat(leaves(c));});return out;}
function enrich(n,lm){var l=lm[n.id]||{};return{id:n.id,name:n.name,part_number:n.part_number,qty:l.qty||1,fastener:l.fastener||null,loctite:l.loctite||null,torque:l.torque||null,sequence_tag:n.sequence_tag||null};}
function grpUnit(unit,lm){
  var g=[];
  (unit.children||[]).forEach(function(c){
    if(c.level===3){g.push({header:c,parts:leaves(c).map(function(p){return enrich(p,lm);})});}
    else{g.push({header:null,parts:[enrich(c,lm)]});}
  });
  return g;
}
function grpAll(roots,lm){
  var g=[];
  roots.forEach(function(r){(r.children||[]).forEach(function(u){
    (u.children||[]).forEach(function(c){
      if(c.level===3){g.push({header:c,parts:leaves(c).map(function(p){return enrich(p,lm);}),unitName:u.name});}
      else{g.push({header:null,parts:[enrich(c,lm)],unitName:u.name});}
    });
  });});
  return g;
}

// ── JSON → groups ────────────────────────────────────
function j2g(jd){
  var d=typeof jd==='string'?JSON.parse(jd):jd;
  return(d||[]).map(function(s,si){
    return{
      header:{name:s.name,sequence_tag:s.badge==='auto'?'A':'F'},
      parts:(s.items||[]).map(function(it,ii){
        return{id:'j_'+si+'_'+ii,name:it.comment||it.pn||'Part',part_number:it.pn||'',qty:it.qty||1,fastener:null,loctite:null,torque:null,sequence_tag:null};
      })
    };
  });
}

function psk(){var x=S.source==='axon'?'a_'+(S.selAssy?S.selAssy.id:'')+'_'+(S.selUnit?S.selUnit.id:'all'):'j_'+(S.selTpl?S.selTpl.id:'f');return'soroi_p_'+x;}
function savP(){localStorage.setItem(psk(),JSON.stringify({p:S.picks,n:S.notes}));}
function lodP(){try{var d=JSON.parse(localStorage.getItem(psk()));S.picks=(d&&d.p)||{};S.notes=(d&&d.n)||{};}catch(e){S.picks={};S.notes={};}}
function clrP(){S.picks={};S.notes={};localStorage.removeItem(psk());}

// ── Sheets write ─────────────────────────────────────
async function writeRows(rows){
  if(!S.sheetId){toast('Set Sheet ID in Settings','err');return false;}
  try{
    await shApi('https://sheets.googleapis.com/v4/spreadsheets/'+S.sheetId+'/values/Sheet1!A:J:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS',{method:'POST',body:JSON.stringify({values:rows})});
    return true;
  }catch(e){
    if(e.message==='NEEDS_AUTH'){toast('Sheets auth needed','err');return 'AUTH';}
    var q=JSON.parse(localStorage.getItem('soroi_q')||'[]');q.push({rows:rows,ts:Date.now()});localStorage.setItem('soroi_q',JSON.stringify(q));
    toast('Saved offline','err');return false;
  }
}

// ── Submit pickup ────────────────────────────────────
async function submitPU(){
  var all=[];S.groups.forEach(function(g){all=all.concat(g.parts);});
  var mk=all.filter(function(p){return S.picks[p.id];}).length;
  if(!mk){toast('Mark items first','err');return;}
  var lb=S.source==='axon'?(S.selUnit?S.selUnit.name:'Full Assembly'):(S.selTpl?S.selTpl.name:'JSON');
  modal('Checkout','Submit '+mk+' item(s) for "'+lb+'"?',[
    {label:'Cancel',cls:'mdc'},
    {label:'Submit',cls:'mdo',fn:async function(){
      S.submitting=true;render();
      var now=new Date();
      var ds=now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
      var ts=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      var rows=[];
      S.groups.forEach(function(g){g.parts.forEach(function(p){
        var st=S.picks[p.id];if(!st)return;
        rows.push([S.user?S.user.name:'',ds+' '+ts,S.selAssy?S.selAssy.name:(S.selTpl?S.selTpl.name:''),lb,p.name,p.part_number||'',(p.qty||1)*S.mult,st==='cart'?'Picked':'Missing',[p.fastener,p.loctite,p.torque].filter(Boolean).join(' / '),S.notes[p.id]||'']);
      });});
      var ok=await writeRows(rows);
      S.submitting=false;
      if(ok===true){
        S.history.unshift({date:ds+' '+ts,assy:rows[0]?rows[0][2]:'',unit:lb,picked:rows.filter(function(r){return r[7]==='Picked';}).length,missing:rows.filter(function(r){return r[7]==='Missing';}).length});
        localStorage.setItem('soroi_hist',JSON.stringify(S.history.slice(0,50)));
        clrP();toast('Submitted!','ok');goBack();
      }
      render();
    }}
  ]);
}

// ── JSON upload ──────────────────────────────────────
function trigUp(){$('jf').click();}
document.addEventListener('DOMContentLoaded',function(){
  var jf=$('jf');
  if(jf)jf.addEventListener('change',async function(e){
    var f=e.target.files[0];if(!f)return;
    try{
      var text=await f.text();var json=JSON.parse(text);
      if(!Array.isArray(json)){toast('Must be array of sections','err');return;}
      var nm=prompt('Template name:',f.name.replace(/\.json$/i,''));if(!nm)return;
      var r=await sb.from('soroi_app_json_templates').insert({name:nm,json_data:json,created_by:S.user?S.user.name:''}).select().single();
      if(r.error)throw r.error;
      S.jsonTpl.unshift(r.data);toast('Saved!','ok');render();
    }catch(er){toast('Import failed: '+er.message,'err');}
    e.target.value='';
  });
});

function goBack(){
  switch(S.view){

    case'axon-u':S.selAssy=null;nav('axon-a');break;

// ── Header builder ───────────────────────────────────
function hdr(t,s,bk,usr){
  var h='<div class="hdr">';
  if(bk)h+='<button class="hdr-bk" onclick="goBack()">'+svg('back')+'</button>';
  h+='<div class="hdr-b"><div class="hdr-t">'+esc(t)+'</div>';
  if(s)h+='<div class="hdr-s">'+esc(s)+'</div>';
  h+='</div>';
  if(usr&&S.user)h+='<div class="hdr-u"><span>'+esc(S.user.name.split(' ')[0])+'</span><button onclick="doLogout()" style="font-size:.7rem;opacity:.6;text-decoration:underline">Out</button></div>';
  h+='</div>';
  return h;
}

// ── Retry queued writes ──────────────────────────────
async function retryQ(){
  var q=JSON.parse(localStorage.getItem('soroi_q')||'[]');
  if(!q.length){toast('Nothing queued');return;}
  var rm=[];
  for(var i=0;i<q.length;i++){var ok=await writeRows(q[i].rows);if(!ok)rm.push(q[i]);}
  localStorage.setItem('soroi_q',JSON.stringify(rm));
  if(rm.length<q.length)toast('Synced '+(q.length-rm.length),'ok');
}

// ── Event binding ────────────────────────────────────
function bindAll(){
  // Axon project
  document.querySelectorAll('[data-a="ap"]').forEach(function(el){el.onclick=function(){
    S.selProj=S.axonProj.find(function(p){return p.id==el.dataset.id;});
    nav('axon-a');loadAxonAssy(el.dataset.id);
  };});
  // Axon assembly
  document.querySelectorAll('[data-a="aa"]').forEach(function(el){el.onclick=async function(){
    S.selAssy={id:el.dataset.id,name:el.dataset.nm};S._tree=null;nav('axon-u');
    var t=await loadAxonTree(el.dataset.id);S._tree=buildTree(t.nodes,t.links);render();
  };});
  // Axon unit
  document.querySelectorAll('[data-a="au"]').forEach(function(el){el.onclick=function(){
    var nm=S._tree.nm,roots=S._tree.roots,lm=S._tree.lm;
    if(el.dataset.id==='all'){S.selUnit=null;S.groups=grpAll(roots,lm);}
    else{S.selUnit=nm[el.dataset.id];S.groups=grpUnit(nm[el.dataset.id],lm);}
    S.source='axon';S.filter='all';S.mult=1;lodP();nav('pickup');
  };});
  // JSON template
  document.querySelectorAll('[data-a="jt"]').forEach(function(el){el.onclick=function(){
    var t=S.jsonTpl.find(function(x){return x.id==el.dataset.id;});if(!t)return;
    S.selTpl=t;S.groups=j2g(t.json_data);S.source='json';S.filter='all';S.mult=1;lodP();nav('pickup');
  };});
  // History
  document.querySelectorAll('[data-a="hi"]').forEach(function(el){el.onclick=function(){nav('hist');};});
  // Pick buttons
  document.querySelectorAll('[data-d="c"]').forEach(function(el){el.onclick=function(e){e.stopPropagation();var id=el.dataset.id;S.picks[id]=S.picks[id]==='cart'?undefined:'cart';if(!S.picks[id])delete S.picks[id];savP();render();};});
  document.querySelectorAll('[data-d="m"]').forEach(function(el){el.onclick=function(e){e.stopPropagation();var id=el.dataset.id;S.picks[id]=S.picks[id]==='miss'?undefined:'miss';if(!S.picks[id])delete S.picks[id];savP();render();};});
  // Notes
  document.querySelectorAll('[data-d="n"]').forEach(function(el){el.oninput=function(){S.notes[el.dataset.id]=el.value;savP();};});
  // Filters
  document.querySelectorAll('[data-f]').forEach(function(el){el.onclick=function(){S.filter=el.dataset.f;render();};});
}
</script>
